trigger:

- master

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: invictustest
      type: git
      name: invictustest/invictustest
      ref: refs/heads/main


steps:
- checkout: invictustest

- task: invicti-platform-azure-extension@1
  inputs:
    apiConnection: 'Invicti Platform'
    targetId: '33fb6efd-45da-481f-9979-db29bfbcbd4a'
    scanProfileId: '11111111-1111-1111-1111-111111111111'
    buildFail: true
    minimumSeverity: 'Medium'
    stopScan: true
    hasReport: true
    reportTemplateId: '11111111-1111-1111-1111-111111111111'