trigger:

- master

pool:
  vmImage: 'ubuntu-latest'


steps:
- checkout: self
- task: CreateDASTTarget@2
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetAddress: 'http://php.testinvicti.com'
    criticality: '30'

- task: ConfigureDASTTarget@2
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetId: '$(createTargetStep.DASTTargetId)'
    description: 'hoooooop'
    limitCrawlerScope: true
    scanSpeed: 'medium'
    importFilePath: 'import_files/openapi-swagger_basicauthentication.yaml'
    authenticationEnabled: true
    authUsername: 'admin'
    authPassword: 'admin123456'
    authUrl: 'http://php.testinvicti.com/auth/login.php'

- task: StartDASTScan@3
  inputs:
    apiUrl: 'https://platform.invicti.com'
    criticalThreshold: '0'
    highThreshold: '0'
    mediumThreshold: '2'
    abortScanOnFindings: true
    targetId: 
    profileId: '11111111-1111-1111-1111-111111111111'
    scheduleDisable: false
    scheduleTimeSensitive: false