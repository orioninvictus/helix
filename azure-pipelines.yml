trigger:

- master

pool:
  vmImage: 'ubuntu-latest'


steps:


- task: CreateDASTTarget@2
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetAddress: 'http://php.testinvicti.com'
    criticality: '30'
- task: ConfigureDASTTarget@2
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetId: '$(createTargetStep.DASTTargetId)'
    description: 'lalalallalala'
    limitCrawlerScope: true
    scanSpeed: 'fast'
    authenticationEnabled: false