trigger:

- master

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: invictustest
      type: git
      name: invictustest/invictustest
      ref: refs/heads/main


steps:
- checkout: invictustest

- task: StartDASTScan@3
  inputs:
    invictiServiceConnection: 'hoopppaalaaa'
    standaloneMode: true
    standaloneTargetId: '2a2cd275-ce75-4930-b0bb-b942a918a2bc'
    criticalThreshold: '0'
    highThreshold: '0'
    mediumThreshold: '2'
    abortScanOnFindings: true
    targetId: 
    profileId: '11111111-1111-1111-1111-111111111111'
    reportTemplateId: '11111111-1111-1111-1111-111111111111'
    generateReport: true
    enableTagging: true

