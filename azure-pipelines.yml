trigger:

- master

pool:
  vmImage: 'ubuntu-latest'


steps:

- task: CreateDASTTarget@1
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetAddress: 'http://php.testinvicti.com/'
- task: ConfigureDASTTarget@1
  inputs:
    apiUrl: 'https://platform.invicti.com'
    targetId: '$(createTargetStep.DASTTargetId)'
    description: 'lalalla'
    limitCrawlerScope: true
    scanSpeed: 'fast'
    authenticationEnabled: true
    authUsername: 'admin'
    authPassword: 'admin123456'
    authUrl: 'http://php.testinvicti.com/auth/login.php'

- task: StartDASTScan@2
  inputs:
    apiUrl: 'https://platform.invicti.com'
    criticalThreshold: '0'
    highThreshold: '5'
    mediumThreshold: '3'
    failBuildOnFindings: false
    abortScanOnFindings: true
    targetId: '$(createTargetStep.DASTTargetId)'
    profileId: '11111111-1111-1111-1111-111111111111'
    scheduleDisable: true