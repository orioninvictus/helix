trigger:
- main

variables:
  # CRITICAL: This satisfies the decorator.yml condition to trigger injection!
  Environment.Name: 'Staging'

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
  - repository: AppRepo
    type: git
    name: orioninvictus/invictustest
    ref: main # Or the specific branch you are targeting

steps:
- checkout: AppRepo
  displayName: 'Checkout Application Repository'

- script: |
    echo "Executing normal developer application build steps..."
    echo "Compiling code, running unit tests, preparing environment..."
  displayName: 'Standard Dev Compilation Step'