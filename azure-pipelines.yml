trigger:
- master # Or whichever branch you are using in GitHub

variables:
  # This variable forces our decorator.yml condition to inject the task
  Environment.Name: 'Staging'

pool:
  vmImage: 'ubuntu-latest'

steps:
# Standard default checkout of your GitHub repository
- checkout: self
  displayName: 'Checkout GitHub Repository'

- script: |
    echo "Checking baseline path..."
    echo "Sources directory is: $(Build.SourcesDirectory)"
    echo "Verifying file exists at root:"
    ls -la $(Build.SourcesDirectory)
  displayName: 'Verify Baseline Files'