trigger:

- master

pool:
  vmImage: 'ubuntu-latest'

resources:
  repositories:
    - repository: invictustest
      type: git
      name: invictustest/invictustest
      ref: refs/heads/main


steps:
- checkout: invictustest

- task: CreateDASTTarget@2
  inputs:
    invictiServiceConnection: 'Invicti Custom Plugin by Erc'
    targetAddress: 'http://php.testinvicti.com'
    criticality: '30'

- task: ConfigureDASTTarget@2
  inputs:
    invictiServiceConnection: 'Invicti Custom Plugin by Erc'
    targetId: 
    limitCrawlerScope: false
    scanSpeed: 'fast'
    authenticationEnabled: false

- task: StartDASTScan@3
  inputs:
    invictiServiceConnection: 'Invicti Custom Plugin by Erc'
    criticalThreshold: '0'
    highThreshold: '0'
    mediumThreshold: '2'
    abortScanOnFindings: true
    targetId: 
    profileId: '11111111-1111-1111-1111-111111111111'
    scheduleDisable: false
    scheduleTimeSensitive: false
    enableTagging: true